name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.exe
            dist/*.deb
            dist/*.rpm
            dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the tag
          TAG=${GITHUB_REF#refs/tags/}
          
          # Create release
          gh release create $TAG \
            --title "Switchboard $TAG" \
            --notes "Built from fork with auto-sync" \
            artifacts/linux-build/*.AppImage \
            artifacts/linux-build/*.deb \
            artifacts/linux-build/*.rpm \
            artifacts/mac-build/*.dmg \
            artifacts/mac-build/*.zip \
            artifacts/win-build/*.exe \
            artifacts/win-build/*.zip
