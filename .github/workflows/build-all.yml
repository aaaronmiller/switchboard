name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
          - os: macos-14
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }} -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.exe
            dist/*.deb
            dist/*.rpm
            dist/*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          # Collect all artifacts into a file list (handles spaces in names)
          find artifacts -type f \( \
            -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
            -o -name '*.dmg' -o -name '*.exe' -o -name '*.zip' \
          \) > /tmp/release-files.txt

          echo "Release files:"
          cat /tmp/release-files.txt

          # Build gh release command args
          ARGS=(release create "$TAG"
            --repo "$GITHUB_REPOSITORY"
            --title "Switchboard $TAG"
            --notes "## What's New

          - **Command Scheduler** — Visual workflow sequencer with 9 step types for orchestrating commands across multiple AI CLI sessions
          - **20+ Built-in Patterns** — AI Orchestration, DevOps, and Utility recipes ready to use
          - **Session Roles & Broadcast** — Tag sessions as @builder/@tester/@reviewer, mirror input to all
          - **Macro Recording** — Capture keystrokes, auto-detect pauses, save as reusable patterns
          - **Template Variables** — Dynamic patterns with built-in and user-defined variables

          See [ROADMAP.md](https://github.com/aaaronmiller/switchboard/blob/main/ROADMAP.md) for upcoming features.")

          while IFS= read -r f; do
            ARGS+=("$f")
          done < /tmp/release-files.txt

          gh "${ARGS[@]}"
