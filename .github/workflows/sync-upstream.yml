name: Sync Upstream & Release

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upstream:
    runs-on: ubuntu-24.04
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Check upstream for new release
        id: check
        run: |
          UPSTREAM_TAG=$(curl -s https://api.github.com/repos/doctly/switchboard/releases/latest \
            | jq -r '.tag_name // empty')
          CURRENT_TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.tag_name // empty')

          echo "Upstream: ${UPSTREAM_TAG:-none}  |  Fork latest: ${CURRENT_TAG:-none}"

          if [ -n "$UPSTREAM_TAG" ] && [ "$UPSTREAM_TAG" != "$CURRENT_TAG" ]; then
            echo "new_release=true"  >> "$GITHUB_OUTPUT"
            echo "tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            echo "No new release to sync."
          fi

  sync-and-build:
    needs: check-upstream
    if: needs.check-upstream.outputs.new_release == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          set -e
          git remote add upstream https://github.com/doctly/switchboard.git
          git fetch upstream main

      - name: Merge upstream into main
        id: merge
        run: |
          set -e
          TAG="${{ needs.check-upstream.outputs.tag }}"
          MAIN_SHA=$(git rev-parse HEAD)

          # Try clean merge first (without auto-committing)
          git merge --no-commit --no-ff upstream/main || true

          # Always restore fork's own workflow files — never let upstream overwrite them
          git checkout HEAD -- .github/workflows/ 2>/dev/null || true

          CONFLICTS=$(git diff --name-only --diff-filter=U)

          if [ -z "$CONFLICTS" ]; then
            # Clean merge — commit and push directly to main
            git commit -m "chore: sync upstream $TAG" || echo "Nothing new to commit."
            git push origin main --force-with-lease
            echo "mode=direct" >> "$GITHUB_OUTPUT"
          else
            # Conflicts in code files — create a review PR
            echo "::warning::Conflicts in: $(echo $CONFLICTS | tr '\n' ' ')"
            git merge --abort

            BRANCH="sync/upstream-$TAG"
            git checkout -b "$BRANCH"

            # Force-resolve conflicts in upstream's favour; restore our workflows
            git merge -X theirs upstream/main \
              -m "chore: sync upstream $TAG (conflicts resolved: theirs)"
            git checkout HEAD@{1} -- .github/workflows/ 2>/dev/null || true
            git diff --cached --quiet || git commit -m "chore: restore fork workflows after sync"

            git push origin "$BRANCH" --force-with-lease
            echo "mode=pr" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR for conflict review
        if: steps.merge.outputs.mode == 'pr'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-upstream.outputs.tag }}"
          BRANCH="${{ steps.merge.outputs.branch }}"
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "$BRANCH" \
            --base main \
            --title "sync: upstream $TAG (review required)" \
            --body "Upstream released **$TAG**. Auto-merge had conflicts — resolved with upstream's version. Review before merging:
          - Verify fork-specific features in \`public/app.js\`, \`package.json\` scripts, and \`main.js\` are preserved or intentionally updated.
          - After merge, the build job below will run automatically.

          [Upstream release notes](https://github.com/doctly/switchboard/releases/tag/$TAG)"
          echo "::notice::PR created for upstream $TAG — review at https://github.com/${{ github.repository }}/pulls"

      - name: Setup Node.js
        if: steps.merge.outputs.mode == 'direct'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install setuptools (node-gyp distutils fix)
        if: steps.merge.outputs.mode == 'direct'
        run: python3 -m pip install setuptools

      - name: Install rpm-build (optional)
        if: steps.merge.outputs.mode == 'direct'
        run: sudo apt-get install -y rpm 2>/dev/null || echo "rpm-build not available, skipping RPM"
      - name: Install dependencies
        if: steps.merge.outputs.mode == 'direct'
        run: npm ci

      - name: Bundle CodeMirror
        if: steps.merge.outputs.mode == 'direct'
        run: npm run bundle:codemirror

      - name: Build Linux packages
        if: steps.merge.outputs.mode == 'direct'
        run: npx electron-builder --linux AppImage deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts
        if: steps.merge.outputs.mode == 'direct'
        run: ls -lh dist/*.AppImage dist/*.deb 2>/dev/null || ls -lh dist/

      - name: Create GitHub Release with Linux artifacts
        if: steps.merge.outputs.mode == 'direct'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-upstream.outputs.tag }}"

          ARTIFACTS=""
          for f in dist/*.AppImage dist/*.deb; do
            [ -f "$f" ] && ARTIFACTS="$ARTIFACTS $f"
          done

          if [ -z "$ARTIFACTS" ]; then
            echo "::error::No build artifacts found in dist/"
            ls dist/ || true
            exit 1
          fi

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Switchboard $TAG (Linux)" \
            --notes "Auto-synced from upstream [doctly/switchboard@$TAG](https://github.com/doctly/switchboard/releases/tag/$TAG) — Linux builds (AppImage + deb)" \
            $ARTIFACTS
