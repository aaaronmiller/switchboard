name: Sync Upstream & Release

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.check.outputs.new_release }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Check upstream for new release
        id: check
        run: |
          UPSTREAM_TAG=$(curl -s https://api.github.com/repos/doctly/switchboard/releases/latest \
            | jq -r '.tag_name // empty')
          CURRENT_TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | jq -r '.tag_name // empty')

          echo "Upstream: ${UPSTREAM_TAG:-none}  |  Fork latest: ${CURRENT_TAG:-none}"

          if [ -n "$UPSTREAM_TAG" ] && [ "$UPSTREAM_TAG" != "$CURRENT_TAG" ]; then
            echo "new_release=true"  >> "$GITHUB_OUTPUT"
            echo "tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            echo "No new release to sync."
          fi

  sync-and-build:
    needs: check-upstream
    if: needs.check-upstream.outputs.new_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/doctly/switchboard.git
          git fetch upstream main

      - name: Merge upstream into main
        id: merge
        run: |
          # Attempt merge without auto-committing
          git merge --no-commit --no-ff upstream/main || true

          # Check for unresolved conflicts (staged with both-modified status)
          CONFLICTS=$(git diff --name-only --diff-filter=U)
          if [ -n "$CONFLICTS" ]; then
            echo "::error::Merge conflicts in: $CONFLICTS"
            git merge --abort
            echo "has_conflict=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: sync upstream ${{ needs.check-upstream.outputs.tag }}" \
              || echo "Nothing new to commit."
            git push origin main
            echo "has_conflict=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail on unresolvable conflict
        if: steps.merge.outputs.has_conflict == 'true'
        run: |
          echo "Manual merge resolution required."
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install setuptools (node-gyp distutils fix)
        run: python3 -m pip install setuptools

      - name: Install rpm-build (for RPM target)
        run: sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Bundle CodeMirror
        run: npm run bundle:codemirror

      - name: Build Linux packages
        run: npx electron-builder --linux
        env:
          # Prevent electron-builder from auto-publishing on this step
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts
        run: ls -lh dist/*.AppImage dist/*.deb dist/*.rpm 2>/dev/null || ls -lh dist/

      - name: Create GitHub Release with Linux artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.check-upstream.outputs.tag }}"

          # Collect artifacts; tolerate missing rpm/deb
          ARTIFACTS=""
          for f in dist/*.AppImage dist/*.deb dist/*.rpm; do
            [ -f "$f" ] && ARTIFACTS="$ARTIFACTS $f"
          done

          if [ -z "$ARTIFACTS" ]; then
            echo "::error::No build artifacts found in dist/"
            ls dist/ || true
            exit 1
          fi

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Switchboard $TAG (Linux)" \
            --notes "Auto-synced from upstream [doctly/switchboard@$TAG](https://github.com/doctly/switchboard/releases/tag/$TAG) — Linux builds (AppImage + deb)" \
            $ARTIFACTS
