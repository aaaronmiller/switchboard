name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
          - os: windows-latest
            platform: win
          # Linux is split per-arch to avoid electron-builder bundling native
          # modules from the wrong architecture
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install setuptools (node-gyp distutils fix)
        run: python -m pip install setuptools

      - name: Install rpm (for RPM target on Linux x64)
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Bundle CodeMirror
        run: npm run bundle:codemirror

      - name: Build (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --${{ matrix.platform }}${{ matrix.arch && format(' --{0}', matrix.arch) || '' }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build (artifacts only)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: npx electron-builder --${{ matrix.platform }}${{ matrix.arch && format(' --{0}', matrix.arch) || '' }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: ignore
